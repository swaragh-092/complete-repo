  #   build:
  #     context: ./pms
  #     dockerfile: Dockerfile
  #   image: pms/nodejs:latest
  #   restart: unless-stopped
  #   container_name: pms
  #   ports:
  #     - 3010:3010
  #   depends_on:
  #     db-pms:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   environment:
  #     NODE_ENV: ${NODE_ENV:-development}
  #     DOCKER_ENV: "true"
  #     PORT: 3010
  #     DB_PREFIX: pms
  #     DB_HOST: db-pms
  #     DB_PORT: 5432
  #     DB_USER: ${PMS_DB_USER:-postgres}
  #     DB_PASSWORD: ${PMS_DB_PASSWORD:-1234}
  #     DB_NAME: one
  #     REDIS_HOST: redis
  #     REDIS_PORT: 6379

  #     # Keycloak Client Credentials (service-to-service auth)
  #     KEYCLOAK_URL: http://keycloak:8080
  #     KEYCLOAK_REALM: my-projects
  #     SERVICE_CLIENT_ID: pms-service
  #     SERVICE_CLIENT_SECRET: ${PMS_SERVICE_CLIENT_SECRET:?PMS_SERVICE_CLIENT_SECRET is required}

  #     # Auth Service URL
  #     AUTH_SERVICE_URL: http://auth-service:4000

  #     # Super Administrator Service URL
  #     SUPER_ADMIN_URL: http://super-administrator:4010
  #   networks:
  #     - auth-network
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: "0.25"
  #         memory: 256M
  #       reservations:
  #         memory: 64M
  #   security_opt:
  #     - no-new-privileges:true
  #   logging:
  #     driver: json-file
  #     options:
  #       max-size: "10m"
  #       max-file: "3"
  #   command: ["server.js"]
  #   healthcheck:
  #     test:
  #       [
  #         "CMD",
  #         "wget",
  #         "--no-verbose",
  #         "--tries=1",
  #         "--spider",
  #         "http://localhost:3010/health",
  #       ]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 30s


  pms-v2:
    build:
      context: ./pms-version-3
      dockerfile: Dockerfile
    image: pms/nodejs:latest
    restart: unless-stopped
    container_name: pms-v2
    ports:
      - 3010:3010
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${ENV:?ENV is required}
      DOCKER_ENV: "true"
      PORT: 3010
      DB_PREFIX: pms
      DB_HOST: ${DATABASE_HOST:?DATABASE_HOST is required}
      DB_PORT: ${DATABASE_PORT:?DATABASE_PORT is required}
      DB_USER: ${DATABASE_USER:?DATABASE_USER is required}
      DB_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      DB_NAME: pms_v2
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # Keycloak Client Credentials (service-to-service auth)
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: my-projects
      SERVICE_CLIENT_ID: pms-service
      SERVICE_CLIENT_SECRET: ${PMS_SERVICE_CLIENT_SECRET:?PMS_SERVICE_CLIENT_SECRET is required}

      # Auth Service URL
      AUTH_SERVICE_URL: http://auth-service:4000

      # Super Administrator Service URL
      SUPER_ADMIN_URL: http://super_admin:4010
    networks:
      - auth-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          memory: 64M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: ["server.js"]
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3010/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────────
  # PMS Frontend (React SPA)
  # ─────────────────────────────────────────────────────────────────────────────
  pms-frontend:
    build:
      context: ./fn-pms-version-2
      dockerfile: Dockerfile
    image: pms-frontend:latest
    container_name: pms-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - auth-network
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 64M
        reservations:
          memory: 32M
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:80/",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────────────────────────────────────────
  # Super Administrator
  # ─────────────────────────────────────────────────────────────────────────────
  super-administrator:
    build:
      context: ./super-administrator
      dockerfile: Dockerfile
    image: super_administrator:latest
    container_name: super-administrator
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${ENV:?ENV is required}
      ENV: ${ENV:?ENV is required}
      PORT: 4010

      DB_HOST: ${DATABASE_HOST:?DATABASE_HOST is required}
      DB_PORT: ${DATABASE_PORT:?DATABASE_PORT is required}
      DB_USER: ${DATABASE_USER:?DATABASE_USER is required}
      DB_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      DB_NAME: ${SUPER_ADMIN_DATABASE_NAME:?SUPER_ADMIN_DATABASE_NAME is required}
      DB_TYPE: postgres
      DB_ZONE: "+05:30"
      DATABASE_PREFIX: ${DATABASE_PREFIX}

      REDIS_HOST: redis
      REDIS_PORT: 6379

      ENC_KEY: ${SUPER_ADMIN_ENC_KEY:?SUPER_ADMIN_ENC_KEY is required}
      ENC_IV: ${SUPER_ADMIN_ENC_IV:?SUPER_ADMIN_ENC_IV is required}

      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      ACCESS_TOKEN_EXPIRE_TIME: ${ACCESS_TOKEN_EXPIRE_TIME:?ACCESS_TOKEN_EXPIRE_TIME is required}
      REFRESH_TOKEN_EXPIRE_TIME: ${REFRESH_TOKEN_EXPIRE_TIME:?REFRESH_TOKEN_EXPIRE_TIME is required}
      RESET_PASSWORD_TOKEN_EXPIRE_TIME: ${RESET_PASSWORD_TOKEN_EXPIRE_TIME:?RESET_PASSWORD_TOKEN_EXPIRE_TIME is required}

      GLOBAL: http://localhost:8080/
      APP: http://localhost:8080/
      APP_NAME: nodejs-starter
      LOGO: images/logo.webp
      FRONT_END_DOMAIN: ${ADMIN_FRONTEND_URL:?ADMIN_FRONTEND_URL is required}
    networks:
      - auth-network
    ports:
      - 4010:4010
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          memory: 64M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: ["server.js"]
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:4010/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# ══════════════════════════════════════════════════════════════════════════════
# NETWORKS
# ══════════════════════════════════════════════════════════════════════════════
networks:
  auth-network:
    name: auth-network
    driver: bridge

# ══════════════════════════════════════════════════════════════════════════════
# VOLUMES
# ══════════════════════════════════════════════════════════════════════════════
volumes:
  postgres-data:
    name: sso-postgres-data
  auth-service-logs:
    name: sso-auth-service-logs
  redis-data:
  email-service-logs:
    name: sso-email-service-logs

# ══════════════════════════════════════════════════════════════════════════════
# SSO Stack - Production Docker Compose
# ══════════════════════════════════════════════════════════════════════════════


services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Gateway (Nginx Reverse Proxy)
  # ─────────────────────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ./gateway
    container_name: gateway
    restart: unless-stopped
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN:?BASE_DOMAIN is required}
    ports:
      - "80:80"
      - "443:443"
    networks:
      auth-network:
        aliases:
          - keycloak.${BASE_DOMAIN}
          - auth.${BASE_DOMAIN}
          - pms.${BASE_DOMAIN}
          - account.${BASE_DOMAIN}
          - admin.${BASE_DOMAIN}
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 64M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
      # keycloak:
      #   condition: service_healthy
      auth-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      pms-v2:
        condition: service_healthy
      pms-frontend:
        condition: service_healthy
      super-administrator:
        condition: service_healthy

  # ════════════════════════════════════════════════════════════════════════════
  # DATABASE (single consolidated PostgreSQL instance)
  # ════════════════════════════════════════════════════════════════════════════

  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL — hosts all application databases
  # init-all-db.sh creates: authzotion_db, pms_v2, super_administrator,
  #                         email_service, and the keycloak role + database.
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DATABASE_USER:?DATABASE_USER is required}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      POSTGRES_DB: postgres
      # Passed through so init-all-db.sh can create each database/role
      AUTH_DB_NAME: ${AUTH_DB_NAME:?AUTH_DB_NAME is required}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER:?KEYCLOAK_DB_USER is required}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD is required}
      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME:?KEYCLOAK_DB_NAME is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # ── Restore script (runs once on fresh volume) ──────────────────────────
      - ./restore-from-backup.sh:/docker-entrypoint-initdb.d/10-restore.sh:ro
      # ── Backup SQL files (mounted at /backups/ so script can reference them) ─
      - ./db-images/postgres-auth/auth-init.sql:/backups/auth-init.sql:ro
      - ./db-images/db-pms/pms-init.sql:/backups/pms-init.sql:ro
      - ./db-images/db-email/init.sql:/backups/email-init.sql:ro
      - ./db-images/db-super-admin/sd-init.sql:/backups/sd-init.sql:ro
      - ./keycloak-setup/init-keycloak-db.sql:/backups/init-keycloak-db.sql:ro
    networks:
      - auth-network
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 768M
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USER} -d postgres",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────────
  # Keycloak — Identity & Access Management
  # ─────────────────────────────────────────────────────────────────────────────
  keycloak:
    build:
      context: ./keycloak-setup
    container_name: keycloak
    restart: unless-stopped
    command: ["start", "--optimized"]
    environment:
      # ── Database ─────────────────────────────────────────────────────────
      KC_DB: ${DATABASE_TYPE:?DATABASE_TYPE is required}
      KC_DB_URL: jdbc:postgresql://${DATABASE_HOST:?DATABASE_HOST is required}:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:?KEYCLOAK_DB_USER is required}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD is required}

      # ── Admin bootstrap (only used on first start) ────────────────────
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:?KEYCLOAK_ADMIN is required}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required}

      # ── Hostname (public-facing URL via nginx gateway) ────────────────
      KC_HOSTNAME: keycloak.${BASE_DOMAIN}

      # ── Proxy / networking ────────────────────────────────────────────
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: true
      KC_HTTPS_ENABLED: false
      KC_HOSTNAME_STRICT: false

      # ── Logging ───────────────────────────────────────────────────────
      KC_LOG_LEVEL: ${KC_LOG_LEVEL:?KC_LOG_LEVEL is required}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - auth-network
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1536M
        reservations:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/health/ready || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  email-service:
    build:
      context: ./email-service
    container_name: email-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${ENV:?ENV is required}
      PORT: 4011

      # SMTP — Primary
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST is required}
      SMTP_PORT: ${SMTP_PORT:?SMTP_PORT is required}
      SMTP_USER: ${SMTP_USER:?SMTP_USER is required}
      SMTP_PASS: ${SMTP_PASS:?SMTP_PASS is required}
      FROM_EMAIL: ${FROM_EMAIL:?FROM_EMAIL is required}

      # SMTP — Backup (optional failover)
      SMTP_BACKUP_HOST: ${SMTP_BACKUP_HOST}
      SMTP_BACKUP_PORT: ${SMTP_BACKUP_PORT}
      SMTP_BACKUP_USER: ${SMTP_BACKUP_USER}
      SMTP_BACKUP_PASS: ${SMTP_BACKUP_PASS}

      # Application
      APP_NAME: ${EMAIL_SERVICE_APP_NAME:?EMAIL_SERVICE_APP_NAME is required}

      # SMTP Pool
      POOL: ${EMAIL_SERVICE_POOL:?EMAIL_SERVICE_POOL is required}
      MAXCONNECTIONS: ${EMAIL_SERVICE_MAXCONNECTIONS:?EMAIL_SERVICE_MAXCONNECTIONS is required}
      MAXMESSAGES: ${EMAIL_SERVICE_MAXMESSAGES:?EMAIL_SERVICE_MAXMESSAGES is required}

      # Keycloak
      # Internal Docker URL (container to container)
      KEYCLOAK_URL: ${LOCAL_KEYCLOAK_URL:?LOCAL_KEYCLOAK_URL is required}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:?KEYCLOAK_REALM is required}
      # Use front-facing URL for issuer validation if tokens are issued by it
      KEYCLOAK_ISSUER_URL: ${KC_HOSTNAME:?KC_HOSTNAME is required}

      # Database (dedicated)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: email_service
      DB_USER: ${DATABASE_USER:?DATABASE_USER is required}
      DB_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}

      # Redis (internal service name)
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # Queue & Scheduling
      QUEUE_MAX_ATTEMPTS: ${EMAIL_SERVICE_QUEUE_MAX_ATTEMPTS:?EMAIL_SERVICE_QUEUE_MAX_ATTEMPTS is required}
      LOG_RETENTION_DAYS: ${EMAIL_SERVICE_LOG_RETENTION_DAYS:?EMAIL_SERVICE_LOG_RETENTION_DAYS is required}
      MAX_DELAY_MS: ${EMAIL_SERVICE_MAX_DELAY_MS:?EMAIL_SERVICE_MAX_DELAY_MS is required}

      # Security
      SERVICE_SECRET: ${AUTH_SERVICE_SECRET:?AUTH_SERVICE_SECRET is required}

      # Service Identity (Keycloak Client Credentials for calling auth-service)
      EMAIL_SERVICE_CLIENT_ID: ${EMAIL_SERVICE_CLIENT_ID:?EMAIL_SERVICE_CLIENT_ID is required}
      EMAIL_SERVICE_CLIENT_SECRET: ${EMAIL_SERVICE_CLIENT_SECRET:?EMAIL_SERVICE_CLIENT_SECRET is required}

      # Auth Service URL (internal Docker network)
      AUTH_SERVICE_URL: http://auth-service:4000
    ports:
      - "${EMAIL_SERVICE_PORT:?EMAIL_SERVICE_PORT is required}:4011"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - email-service-logs:/app/logs
    networks:
      - auth-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          memory: 64M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:4011/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 200mb --maxmemory-policy allkeys-lru
    networks:
      - auth-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          memory: 64M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ════════════════════════════════════════════════════════════════════════════
  # BACKEND SERVICES
  # ════════════════════════════════════════════════════════════════════════════

  # ─────────────────────────────────────────────────────────────────────────────
  # Auth Service (Node.js API)
  # ─────────────────────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: infrastructure/Dockerfile
    container_name: sso-auth-service
    restart: unless-stopped

    environment:
      NODE_ENV: ${ENV:?ENV is required}
      PORT: 4000
      # Allow self-signed certs for internal HTTPS calls to Keycloak
      NODE_TLS_REJECT_UNAUTHORIZED: "0"

      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${AUTH_DB_NAME:?AUTH_DB_NAME is required}
      DATABASE_USER: ${DATABASE_USER:?DATABASE_USER is required}
      DB_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}

      # Keycloak
      # Internal Docker URL (container to container)
      KEYCLOAK_URL: ${LOCAL_KEYCLOAK_URL:?LOCAL_KEYCLOAK_URL is required}
      # External Browser URL (browser to keycloak)
      FRONTEND_AUTH_URL: ${AUTH_FRONTEND_URL:?AUTH_FRONTEND_URL is required}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:?KEYCLOAK_REALM is required}
      KEYCLOAK_REALM_ID: ${KEYCLOAK_REALM_ID}
      KEYCLOAK_ACCOUNT_UI_CLIENT_SECRET: ${KEYCLOAK_ACCOUNT_UI_CLIENT_SECRET}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:?KEYCLOAK_PUBLIC_URL is required}

      # URLs
      FRONTEND_URL: ${ADMIN_FRONTEND_URL:?ADMIN_FRONTEND_URL is required}
      ACCOUNT_UI_URL: ${ACCOUNT_FRONTEND_URL:?ACCOUNT_FRONTEND_URL is required}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:?AUTH_SERVICE_URL is required}

      # Service Account Identity (for calling other services like email-service)
      AUTH_SERVICE_CLIENT_ID: ${AUTH_SERVICE_CLIENT_ID:?AUTH_SERVICE_CLIENT_ID is required}
      AUTH_SERVICE_CLIENT_SECRET: ${AUTH_SERVICE_CLIENT_SECRET}

      # PMS Frontend SSO client secret (used by migration 20260407000000)
      FN_PMS_CLIENT_SECRET: ${FN_PMS_CLIENT_SECRET:?FN_PMS_CLIENT_SECRET is required}

      # Session
      SESSION_SECRET: ${AUTH_SESSION_SECRET:?AUTH_SESSION_SECRET is required}
      SESSION_COOKIE_NAME: ${AUTH_SESSION_COOKIE_NAME:?AUTH_SESSION_COOKIE_NAME is required}
      SESSION_COOKIE_DOMAIN: ${AUTH_SESSION_COOKIE_DOMAIN:?AUTH_SESSION_COOKIE_DOMAIN is required}
      SESSION_COOKIE_SECURE: ${AUTH_SESSION_COOKIE_SECURE:?AUTH_SESSION_COOKIE_SECURE is required}
      SESSION_COOKIE_SAMESITE: ${AUTH_SESSION_COOKIE_SAMESITE:?AUTH_SESSION_COOKIE_SAMESITE is required}

      # Refresh Token
      REFRESH_COOKIE_DOMAIN: ${AUTH_REFRESH_COOKIE_DOMAIN:?AUTH_REFRESH_COOKIE_DOMAIN is required}
      REFRESH_COOKIE_SECURE: ${AUTH_REFRESH_COOKIE_SECURE:?AUTH_REFRESH_COOKIE_SECURE is required}
      REFRESH_COOKIE_SAMESITE: ${AUTH_REFRESH_COOKIE_SAMESITE:?AUTH_REFRESH_COOKIE_SAMESITE is required}
      REFRESH_COOKIE_MAX_AGE: ${AUTH_REFRESH_COOKIE_MAX_AGE:?AUTH_REFRESH_COOKIE_MAX_AGE is required}

      # CORS & Proxy
      TRUST_PROXY: ${AUTH_TRUST_PROXY:?AUTH_TRUST_PROXY is required}
      CORS_FALLBACK_ORIGINS: ${AUTH_CORS_FALLBACK_ORIGINS}

      # Email Service (Microservice)
      EMAIL_SERVICE_URL: http://email-service:4011
      SERVICE_SECRET: ${AUTH_SERVICE_SECRET:?AUTH_SERVICE_SECRET is required}

      # Security
      FP_SALT: ${AUTH_FP_SALT}
      DEVICE_TRUST_DURATION_DAYS: ${AUTH_DEVICE_TRUST_DURATION_DAYS:?AUTH_DEVICE_TRUST_DURATION_DAYS is required}
      DEVICE_MAX_PER_USER: ${AUTH_DEVICE_MAX_PER_USER:?AUTH_DEVICE_MAX_PER_USER is required}
      DEVICE_SIMILARITY_THRESHOLD: ${AUTH_DEVICE_SIMILARITY_THRESHOLD:?AUTH_DEVICE_SIMILARITY_THRESHOLD is required}
    ports:
      - "${AUTH_SERVICE_PORT:?AUTH_SERVICE_PORT is required}:4000"
    volumes:
      - auth-service-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      email-service:
        condition: service_healthy
    networks:
      - auth-network
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          memory: 128M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:4000/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ════════════════════════════════════════════════════════════════════════════
  # FRONTEND APPLICATIONS
  # ════════════════════════════════════════════════════════════════════════════

  # ─────────────────────────────────────────────────────────────────────────────
  # Auth UI (Admin Dashboard)
  # ─────────────────────────────────────────────────────────────────────────────
  auth-ui:
    build:
      context: ./auth-ui
      dockerfile: infrastructure/Dockerfile
      args:
        VITE_CLIENT_KEY: ${VITE_AUTH_UI_CLIENT_KEY:?VITE_AUTH_UI_CLIENT_KEY is required}
        VITE_AUTH_BASE_URL: ${VITE_AUTH_UI_AUTH_BASE_URL}
        VITE_API_URL: ${VITE_AUTH_UI_API_URL}
        VITE_AUTH_URL: ${VITE_AUTH_UI_AUTH_URL}
        VITE_ACCOUNT_UI_URL: ${VITE_LOGIN_ACCOUNT_UI_URL}
        VITE_CALLBACK_URL: ${VITE_AUTH_UI_CALLBACK_URL}
    container_name: sso-auth-ui
    restart: unless-stopped
    # Ports removed - accessed via Gateway
    # ports:
    #   - "${AUTH_UI_PORT:-5173}:80"
    depends_on:
      auth-service:
        condition: service_healthy
    networks:
      - auth-network
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 64M
        reservations:
          memory: 32M
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:80/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────────────────────────────────────────
  # Centralized Login (User Login Portal)
  # # ─────────────────────────────────────────────────────────────────────────────
  centralized-login:
    build:
      context: ./centralized-login
      dockerfile: infrastructure/Dockerfile
      args:
        VITE_CLIENT_KEY: ${VITE_LOGIN_CLIENT_KEY:?VITE_LOGIN_CLIENT_KEY is required}
        VITE_AUTH_BASE_URL: ${VITE_LOGIN_AUTH_BASE_URL}
        VITE_ACCOUNT_UI_URL: ${VITE_LOGIN_ACCOUNT_UI_URL}
        VITE_REDIRECT_URI: ${VITE_LOGIN_REDIRECT_URI}
    container_name: sso-centralized-login
    restart: unless-stopped
    # Ports removed - accessed via Gateway
    # ports:
    #   - "${CENTRALIZED_LOGIN_PORT:-5174}:80"
    depends_on:
      auth-service:
        condition: service_healthy
    networks:
      - auth-network
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 64M
        reservations:
          memory: 32M
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:80/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ════════════════════════════════════════════════════════════════════════════
  # PMS & SUPER ADMINISTRATOR SERVICES
  # ════════════════════════════════════════════════════════════════════════════

  # ─────────────────────────────────────────────────────────────────────────────
  # PMS (Project Management System)
  # ─────────────────────────────────────────────────────────────────────────────

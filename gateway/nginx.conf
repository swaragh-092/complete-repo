# ============================================================================
# Worker / OS
# ============================================================================
worker_processes      auto;
worker_rlimit_nofile  65535; # Must exceed worker_connections × 2 for OS fd limits

# ============================================================================
# Events
# ============================================================================
events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll; # Linux kernel event notification
}

# ============================================================================
# HTTP
# ============================================================================
http {

    # ─── MIME types ────────────────────────────────────────────────────────
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Security ──────────────────────────────────────────────────────────
    server_tokens off; # Hide nginx version from error pages and Server header

    # ─── Connection performance ────────────────────────────────────────────
    sendfile           on;  # Zero-copy static file serving
    tcp_nopush         on;  # Batch TCP packets (works with sendfile)
    tcp_nodelay        on;  # Disable Nagle for low-latency small packets
    keepalive_timeout  30;  # Reuse connections for 30 s
    keepalive_requests 1000; # Max requests per keepalive connection

    # ─── SSL / TLS ─────────────────────────────────────────────────────────
    # ssl_certificate     /etc/nginx/certs/wildcard.fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/wildcard.privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:!aNULL:!MD5;
    ssl_prefer_server_ciphers off; # Let clients pick (required for TLS 1.3 compatibility)

    # SSL session cache — reduces TLS handshake overhead
    ssl_session_cache   shared:SSL:10m; # ~40 000 sessions
    ssl_session_timeout 1d;
    ssl_session_tickets off; # Disable tickets for perfect forward secrecy

    # OCSP stapling — speeds up client certificate verification
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ─── Logging ───────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

    log_format ratelimitlog '$remote_addr - $status - $request_time - $request_uri';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Compression ───────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;   # Add Vary: Accept-Encoding for proxy caches
    gzip_proxied      any;  # Compress proxied responses too
    gzip_comp_level   4;    # Balance between CPU cost and compression ratio
    gzip_min_length   256;  # Don't compress tiny responses
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ─── Includes ──────────────────────────────────────────────────────────
    # Global directives (maps, rate zones, resolver)
    include /etc/nginx/conf.d/global/*.conf;

    # Upstream service registry
    include /etc/nginx/conf.d/upstreams.conf;

    # Per-service virtual host configs
    include /etc/nginx/conf.d/services/*.conf;

    # Catch-all / redirect virtual hosts
    include /etc/nginx/conf.d/servers/*.conf;

}


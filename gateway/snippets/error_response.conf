# ============================================================================
# Error Response Handler
# ============================================================================
# Purpose: Consistent JSON error responses for API gateway
# ============================================================================

# Error page mappings
# Each code is mapped individually so the correct HTTP status is preserved
error_page 401 = @error401;
error_page 403 = @error403;
error_page 404 = @error404;
error_page 500 = @error500;
error_page 502 = @error502;
error_page 503 = @error503;
error_page 504 = @error504;

# ============================================================================
# Error Locations
# ============================================================================

location @error401 {
    default_type application/json;
    include /etc/nginx/snippets/security_headers.conf;
    return 401 '{"error":"Unauthorized","code":401}';
}

location @error403 {
    default_type application/json;
    include /etc/nginx/snippets/security_headers.conf;
    return 403 '{"error":"Forbidden","code":403}';
}

location @error404 {
    default_type application/json;
    include /etc/nginx/snippets/security_headers.conf;
    return 404 '{"error":"Not Found","code":404}';
}

location @error500 {
    default_type application/json;
    include /etc/nginx/snippets/security_headers.conf;
    return 500 '{"error":"Internal Server Error","code":500}';
}

location @error502 {
    default_type application/json;
    include /etc/nginx/snippets/security_headers.conf;
    return 502 '{"error":"Bad Gateway","code":502}';
}

location @error503 {
    default_type application/json;
    include /etc/nginx/snippets/security_headers.conf;
    return 503 '{"error":"Service Unavailable","code":503}';
}

location @error504 {
    default_type application/json;
    include /etc/nginx/snippets/security_headers.conf;
    return 504 '{"error":"Gateway Timeout","code":504}';
}

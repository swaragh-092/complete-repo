# ---------------------------
# Security Headers
# ---------------------------
# Prevent clickjacking
add_header X-Frame-Options "SAMEORIGIN" always;

# Enable XSS protection (older browsers)
add_header X-XSS-Protection "1; mode=block" always;

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# # Content Security Policy (adjust as per your app)
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://*.${BASE_DOMAIN} wss://*.${BASE_DOMAIN}; object-src 'none'; frame-ancestors 'self'; base-uri 'self';" always;

# Referrer policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions policy (formerly Feature Policy)
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# Cross-Origin Resource Sharing
# $cors_origin resolves to the request origin for whitelisted origins, or ""
# for unknown origins — defined in conf.d/global/maps.conf
# NOTE: Access-Control-Allow-Origin "*" + Access-Control-Allow-Credentials "true"
# is invalid per CORS spec; browsers reject it. Use explicit origin whitelist.
add_header Access-Control-Allow-Origin $cors_origin always;
add_header Vary "Origin" always;
add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS" always;
add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-Client-Key, X-Session-Id, X-Org-Id, X-Tenant-Id, X-Refresh-Token" always;
add_header Access-Control-Allow-Credentials "true" always;
add_header Access-Control-Max-Age "86400" always;
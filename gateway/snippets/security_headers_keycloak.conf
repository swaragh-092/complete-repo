# ============================================================================
# Keycloak-specific Security Headers
# ============================================================================
# Why not use security_headers.conf here:
#   - CSP is omitted  — Keycloak serves its own admin UI/login pages and
#     manages its own Content-Security-Policy internally.
#   - CORS is omitted — Keycloak issues its own CORS headers on OIDC
#     endpoints. Duplicating them here would cause "multiple header" errors
#     in browsers and break token flows.
# ============================================================================

# Enforce HTTPS for all future requests from this origin
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Allow SAMEORIGIN iframes — required for Keycloak admin console embedded views
add_header X-Frame-Options "SAMEORIGIN" always;

# Limit referrer information sent to third parties
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

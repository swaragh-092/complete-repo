
# ─────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS redirects
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name ~^(?<project>[^.]+)\.${BASE_DOMAIN}$;
    return 301 https://$host$request_uri;
}
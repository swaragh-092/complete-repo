# ============================================================================
# Default Server Block (Catch-All)
# ============================================================================
# Purpose: Reject requests for unknown or undefined hostnames
# Security: Prevents host header attacks and information disclosure
# ============================================================================

server {
    listen 80 default_server;
    server_name _;
    
    # Health check endpoint
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }
    
    # Reject all other requests
    location / {
        return 444;
    }
}

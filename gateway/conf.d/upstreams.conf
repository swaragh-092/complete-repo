# Upstream to PMS (source of truth)
# Using variables to force runtime DNS resolution in Docker
upstream pms {
    # server pms:3010 max_fails=3 fail_timeout=30s;
    server pms-v2:3010 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

#Upstream to Super Admin (source of truth)
# Using variables to force runtime DNS resolution in Docker
upstream super_admin {
    server super-administrator:4010 max_fails=3 fail_timeout=30s;
    keepalive 64;
}


# ============================================================================
# Upstream Service Registry
# ============================================================================
# All upstream blocks are defined here for consistency.
# The Docker DNS resolver (127.0.0.11) re-resolves names every 30 s so that
# container restarts are handled transparently (see global/resolver.conf).
# keepalive = idle connections kept open per worker for connection pooling.
# ============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# Auth UI (Admin Dashboard SPA)
# ─────────────────────────────────────────────────────────────────────────────
upstream auth_ui {
    server auth-ui:80 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ─────────────────────────────────────────────────────────────────────────────
# Centralized Login (Account SPA)
# ─────────────────────────────────────────────────────────────────────────────
upstream centralized_login {
    server centralized-login:80 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ─────────────────────────────────────────────────────────────────────────────
# Auth Service (API)
# ─────────────────────────────────────────────────────────────────────────────
upstream auth_service {
    server auth-service:4000 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

# ─────────────────────────────────────────────────────────────────────────────
# PMS (Project Management Service API)
# ─────────────────────────────────────────────────────────────────────────────
upstream pms {
    server pms-v2:3010 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

# ─────────────────────────────────────────────────────────────────────────────
# Super Administrator (Organisation Management API)
# ─────────────────────────────────────────────────────────────────────────────
upstream super_admin {
    server super-administrator:4010 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

# ─────────────────────────────────────────────────────────────────────────────
# Email Service (Transactional Email API)
# ─────────────────────────────────────────────────────────────────────────────
upstream email_service {
    server email-service:4011 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ─────────────────────────────────────────────────────────────────────────────
# PMS Frontend (React SPA)
# ─────────────────────────────────────────────────────────────────────────────
upstream pms_frontend {
    server pms-frontend:80 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ─────────────────────────────────────────────────────────────────────────────
# Keycloak (Identity & Access Management)
# ─────────────────────────────────────────────────────────────────────────────
upstream keycloak {
    server keycloak:8080 max_fails=3 fail_timeout=30s;
    keepalive 64;
}


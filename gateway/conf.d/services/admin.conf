# ============================================================================
# Super Admin Server (Organization Management)
# ============================================================================

server {
    listen 443 ssl;

    server_name org.${BASE_DOMAIN};

    location = /_healthz {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    include /etc/nginx/snippets/error_response.conf;

    # -------------------------
    # CORS preflight — must be handled before the main location block
    # Using a dedicated location avoids the nginx `if` anti-pattern
    # -------------------------
    location / {
        # Handle OPTIONS preflight first — return early without proxying
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Content-Length 0 always;
            return 204;
        }

        default_type application/json;

        limit_req zone=req_limit burst=20 nodelay;

        limit_except GET POST PUT PATCH DELETE HEAD OPTIONS { deny all; }

        include /etc/nginx/snippets/proxy_headers.conf;
        include /etc/nginx/snippets/security_headers.conf;

        proxy_pass http://super_admin;
    }
}

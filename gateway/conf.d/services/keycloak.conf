# ============================================================================
# Keycloak (Identity and Access Management)
# ============================================================================

server {
    listen 443 ssl;
    http2 on;

    server_name keycloak.local.test;

    # Health check
    location = /_healthz {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    include /etc/nginx/snippets/error_response.conf;

    # -------------------------
    # Keycloak proxy
    # -------------------------

    location / {
        # Basic abuse protection
        limit_req zone=req_limit burst=50 nodelay;

        # Allow common methods
        limit_except GET POST PUT PATCH DELETE HEAD OPTIONS { deny all; }

        include /etc/nginx/snippets/proxy_headers.conf;
        # Don't include security_headers.conf for Keycloak to allow iframes

        # Keycloak-specific headers
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Allow iframes for Keycloak admin console
        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "SAMEORIGIN" always;

        # Proxy to Keycloak HTTP port
        set $upstream_keycloak http://keycloak:8080;
        proxy_pass $upstream_keycloak;

        # Disable buffering for SSE/streaming responses
        proxy_buffering off;
    }
}

# Also listen on 8443 for backward compatibility
server {
    listen 8443 ssl;
    http2 on;

    server_name keycloak.local.test;

    # Health check
    location = /_healthz {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    include /etc/nginx/snippets/error_response.conf;

    # -------------------------
    # Keycloak proxy
    # -------------------------

    location / {
        # Basic abuse protection
        limit_req zone=req_limit burst=50 nodelay;

        # Allow common methods
        limit_except GET POST PUT PATCH DELETE HEAD OPTIONS { deny all; }

        include /etc/nginx/snippets/proxy_headers.conf;
        # Don't include security_headers.conf for Keycloak to allow iframes

        # Keycloak-specific headers
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host:8443;
        proxy_set_header X-Forwarded-Port 8443;

        # Allow iframes for Keycloak admin console
        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "SAMEORIGIN" always;

        # Proxy to Keycloak HTTP port
        set $upstream_keycloak http://keycloak:8080;
        proxy_pass $upstream_keycloak;

        # Disable buffering for SSE/streaming responses
        proxy_buffering off;
    }
}

# ============================================================================
# Keycloak (Identity and Access Management)
# ============================================================================
# TLS termination: nginx handles HTTPS. Keycloak runs HTTP-only internally.
# Keycloak is configured with KC_PROXY_HEADERS=xforwarded so it trusts the
# X-Forwarded-Proto/Host/Port headers nginx injects via proxy_headers.conf.
# ============================================================================

server {
    listen 443 ssl;

    server_name keycloak.${BASE_DOMAIN};

    include /etc/nginx/snippets/error_response.conf;

    # -------------------------
    # Nginx-level liveness probe (is the gateway container up?)
    # -------------------------
    location = /_healthz {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    # -------------------------
    # Keycloak native readiness probe (is Keycloak itself ready?)
    # Proxied so callers get the real Keycloak health status.
    # -------------------------
    location = /health/ready {
        access_log off;
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_pass http://keycloak/health/ready;
    }

    # -------------------------
    # OIDC token & authentication endpoints
    # Stricter rate limit to protect against brute-force and credential stuffing.
    # -------------------------
    location ~* ^/realms/[^/]+/protocol/openid-connect/(token|auth|logout|userinfo|revoke|certs) {
        limit_req zone=login_limit burst=5 nodelay;
        access_log /var/log/nginx/rate_limit.log ratelimitlog;

        limit_except GET POST OPTIONS { deny all; }

        include /etc/nginx/snippets/proxy_headers.conf;
        include /etc/nginx/snippets/security_headers_keycloak.conf;

        # Keycloak manages its own OIDC CORS headers — do not add ours here.

        # Disable response buffering: Keycloak uses SSE for auth flows
        # and large token responses must not be held in nginx memory.
        proxy_buffering off;

        proxy_pass http://keycloak;
    }

    # -------------------------
    # All other Keycloak routes (admin console, JS adapter, realm pages, etc.)
    # -------------------------
    location / {
        limit_req zone=req_limit burst=50 nodelay;

        limit_except GET POST PUT PATCH DELETE HEAD OPTIONS { deny all; }

        include /etc/nginx/snippets/proxy_headers.conf;
        include /etc/nginx/snippets/security_headers_keycloak.conf;

        proxy_buffering off;

        proxy_pass http://keycloak;
    }
}

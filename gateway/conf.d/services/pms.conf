# ============================================================================
# PMS HTTPS Server
# ============================================================================

server {
    listen 80;

    server_name pms.gururajhr.in;

    # Health
    location = /_healthz {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    include /etc/nginx/snippets/error_response.conf;

    # ─── PMS API (backend) ─────────────────────────────────────────────────
    location /pms_mod/ {
        limit_req zone=req_limit burst=20 nodelay;
        limit_except GET POST PUT PATCH DELETE HEAD OPTIONS { deny all; }

        include /etc/nginx/snippets/proxy_headers.conf;
        include /etc/nginx/snippets/security_headers.conf;

        proxy_pass http://pms;
    }

    # ─── PMS Frontend (React SPA) ──────────────────────────────────────────
    # Proxy to the pms-frontend container (nginx serving Vite build output).
    # The container handles SPA fallback (try_files → index.html) internally.
    location / {
        limit_req zone=req_limit burst=50 nodelay;
        limit_except GET HEAD OPTIONS { deny all; }

        include /etc/nginx/snippets/proxy_headers.conf;
        include /etc/nginx/snippets/security_headers.conf;

        proxy_pass http://pms_frontend;
    }
}

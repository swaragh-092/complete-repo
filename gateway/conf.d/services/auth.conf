# ============================================================================
# Auth UI (Admin Dashboard)
# ============================================================================

server {
    listen 80;

    server_name admin.gururajhr.in;

    location = /_healthz {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    include /etc/nginx/snippets/error_response.conf;

    location / {
        default_type application/json;

        limit_req zone=req_limit burst=20 nodelay;

        limit_except GET POST PUT PATCH DELETE HEAD OPTIONS { deny all; }

        include /etc/nginx/snippets/proxy_headers.conf;
        include /etc/nginx/snippets/security_headers.conf;

        proxy_pass http://auth_ui;
    }
}

# ============================================================================
# Centralized Login (Account UI)
# ============================================================================

server {
    listen 80;

    server_name account.gururajhr.in;

    location = /_healthz {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    include /etc/nginx/snippets/error_response.conf;

    # Static assets — relaxed rate limit, cache-friendly headers
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        limit_req zone=static_limit burst=100 nodelay;

        include /etc/nginx/snippets/proxy_headers.conf;
        include /etc/nginx/snippets/security_headers.conf;

        proxy_pass http://centralized_login;
    }

    location / {
        default_type application/json;

        limit_req zone=req_limit burst=50 nodelay;

        limit_except GET POST PUT PATCH DELETE HEAD OPTIONS { deny all; }

        include /etc/nginx/snippets/proxy_headers.conf;
        include /etc/nginx/snippets/security_headers.conf;

        proxy_pass http://centralized_login;
    }
}

# ============================================================================
# Auth Service API
# ============================================================================

server {
    listen 80;

    server_name auth.gururajhr.in;

    location = /_healthz {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    include /etc/nginx/snippets/error_response.conf;

    # Strip upstream CORS headers so nginx doesn't produce duplicates
    # (auth-service sets its own CORS; security_headers.conf adds nginx-level ones)
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Expose-Headers;

    # -------------------------
    # Sensitive auth endpoints — strict rate limit (brute-force protection)
    # -------------------------
    location ~* ^/api/auth/(login|refresh-token|forgot-password|reset-password|verify-email) {
        default_type application/json;

        limit_req zone=login_limit burst=3 nodelay;
        access_log /var/log/nginx/rate_limit.log ratelimitlog;

        limit_except POST OPTIONS { deny all; }

        include /etc/nginx/snippets/proxy_headers.conf;
        include /etc/nginx/snippets/security_headers.conf;

        proxy_pass http://auth_service;
    }

    # Handle CORS preflight at the gateway — terminates early, no upstream hit needed
    location / {
        if ($request_method = OPTIONS) {
            include /etc/nginx/snippets/security_headers.conf;
            return 204;
        }

        default_type application/json;

        limit_req zone=req_limit burst=20 nodelay;

        limit_except GET POST PUT PATCH DELETE HEAD OPTIONS { deny all; }

        include /etc/nginx/snippets/proxy_headers.conf;
        include /etc/nginx/snippets/security_headers.conf;

        proxy_pass http://auth_service;
    }
}

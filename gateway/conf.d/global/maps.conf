# ============================================================================
# HTTP Context Maps
# ============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# WebSocket / HTTP Upgrade map
# ─────────────────────────────────────────────────────────────────────────────
# When the client sends an Upgrade header (WebSocket), pass "upgrade" to the
# upstream. For regular HTTP requests, send "" so upstream keepalive works.
map $http_upgrade $proxy_connection {
    default   "upgrade";
    ""        "keep-alive";
}

# ─────────────────────────────────────────────────────────────────────────────
# CORS Allowed Origins Whitelist
# ─────────────────────────────────────────────────────────────────────────────
# Maps the incoming Origin header to an allowed value.
# Non-whitelisted origins resolve to "" which causes browsers to block the
# cross-origin request — the correct security behaviour.
# Add/remove origins here as your deployment evolves.
map $http_origin $cors_origin {
    default                           "";
    "https://admin.gururajhr.in"      "$http_origin";
    "https://account.gururajhr.in"    "$http_origin";
    "https://pms.gururajhr.in"        "$http_origin";
    "https://org.gururajhr.in"        "$http_origin";
    "https://auth.gururajhr.in"       "$http_origin";
    "https://email.gururajhr.in"      "$http_origin";
    "https://keycloak.gururajhr.in"   "$http_origin";
}

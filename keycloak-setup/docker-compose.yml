# ══════════════════════════════════════════════════════════════════════════════
# Keycloak Setup - Docker Compose
# ══════════════════════════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-keycloak-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - auth-network
    ports:
      - "5433:5432"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          memory: 128M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U keycloak" ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak123
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin123
      KC_LOG_LEVEL: org.keycloak.sessions:DEBUG,org.keycloak.authentication:DEBUG,org.keycloak.events:DEBUG
      # ═══════════════════════════════════════════════════════════════════
      # HTTPS Configuration
      # ═══════════════════════════════════════════════════════════════════
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/conf/cert.pem
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/conf/key.pem
      KC_HOSTNAME: keycloak.local.test
      KC_HOSTNAME_URL: https://keycloak.local.test:8443
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8081:8080" # HTTP (keep for compatibility)
      - "8443:8443" # HTTPS (new port for secure connections)
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - auth-network
    volumes:
      - ./cert.pem:/opt/keycloak/conf/cert.pem:ro
      - ./key.pem:/opt/keycloak/conf/key.pem:ro
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 768M
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 15s
      timeout: 10s
      retries: 5


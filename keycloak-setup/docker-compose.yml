# ══════════════════════════════════════════════════════════════════════════════
# Keycloak Setup - Docker Compose
# ══════════════════════════════════════════════════════════════════════════════
# Architecture note:
#   nginx gateway  ──HTTPS──►  internet
#   nginx gateway  ──HTTP──►   keycloak:8080  (internal Docker network only)
#
# Keycloak does NOT terminate TLS itself. nginx terminates TLS and forwards
# requests via plain HTTP on the isolated Docker bridge network. Keycloak
# trusts the X-Forwarded-* headers injected by nginx (KC_PROXY_HEADERS).
# ══════════════════════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL — Keycloak database
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${KEYCLOAK_DB_NAME:?KEYCLOAK_DB_NAME is required}
      POSTGRES_USER:     ${KEYCLOAK_DB_USER:?KEYCLOAK_DB_USER is required}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD is required}
      POSTGRES_PORT:     ${KEYCLOAK_DB_PORT:?KEYCLOAK_DB_PORT is required}
      
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./init-keycloak-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - auth-network
    # read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          memory: 128M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────────────────
  # Keycloak — Identity & Access Management
  # ─────────────────────────────────────────────────────────────────────────────
  keycloak:
    build:
      context: .
    restart: unless-stopped
    # `start --optimized` requires the kc.sh build step from the Dockerfile.
    # Do NOT use bare `start` here — that bypasses the optimised distribution.
    command: ["start", "--optimized"]
    environment:
      # ── Database ─────────────────────────────────────────────────────────
      KC_DB:          postgres
      KC_DB_URL:      jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:?KEYCLOAK_DB_USER is required}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD is required}

      # ── Admin bootstrap (only used on first start) ────────────────────
      KEYCLOAK_ADMIN:          ${KEYCLOAK_ADMIN:?KEYCLOAK_ADMIN is required}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required}

      # ── Hostname (public-facing URL via nginx gateway) ────────────────
      # Keycloak uses this to generate redirect URIs, token issuers, etc.
      KC_HOSTNAME: ${KC_HOSTNAME:-keycloak.gururajhr.in}

      # ── Proxy / networking ────────────────────────────────────────────
      # xforwarded: trust X-Forwarded-Proto/Host/Port from nginx.
      # This is the correct mode when nginx terminates TLS.
      KC_PROXY_HEADERS: xforwarded

      # HTTP-only internal listener — nginx handles TLS externally.
      KC_HTTP_ENABLED: true

      # Disable HTTPS listener inside the container; nginx owns HTTPS.
      KC_HTTPS_ENABLED: false

      # ── Logging ───────────────────────────────────────────────────────
      KC_LOG_LEVEL: ${KC_LOG_LEVEL:-INFO}

    # No host port mapping — all external traffic must flow through nginx.
    # Keycloak is reachable at http://keycloak:8080 on the internal network.
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - auth-network
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1536M
        reservations:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/health/ready || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  postgres_data:

networks:
  auth-network:
    name: auth-network
    driver: bridge

